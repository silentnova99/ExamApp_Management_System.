<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Question Bank</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary"><i class="bi bi-list-check"></i> All Questions</h2>
            <a href="{% url 'addquestion' %}" class="btn btn-success"><i class="bi bi-plus-circle"></i> Add New Question</a>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover table-bordered text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Question Text</th>
                            <th>Subject</th>
                            <th>Correct Answer</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for q in questions %}
                        <tr>
                            <td>{{ q.qid }}</td>
                            <td class="text-start">{{ q.qtext }}</td>
                            <td><span class="badge bg-info text-dark">{{ q.subject }}</span></td>
                            <td class="text-success fw-bold">{{ q.correct_ans }}</td>
                            <td>
                                <a href="{% url 'editquestion' q.qid %}"" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
                                <a href="#" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="5" class="text-muted py-4">No questions found in the database.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a href="{% url 'home' %}" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
</body>
</html>
