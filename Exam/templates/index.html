<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamApp Suite | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .hero-section { 
            background: linear-gradient(120deg, #1e3c72, #2a5298); 
            color: white; 
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .navbar {
            background-color: rgba(0,0,0,0.9) !important;
        }
        .registration-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.1rem;
        }
        .registration-link:hover {
            color: #ffc107;
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                <i class="bi bi-mortarboard-fill text-warning"></i> EXAMAPP
            </a>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1 class="display-2 fw-bold mb-3">Online Examination System</h1>
            <p class="lead mb-4 fs-3">Please log in to your account to begin the examination.</p>
            
            <div class="d-grid gap-3 col-md-4 mx-auto">
                <a href="{% url 'login' %}" class="btn btn-warning btn-lg fw-bold shadow-lg py-3">
                    Log In to Start Test
                </a>
                
                <div class="mt-2">
                    <span class="text-white-50">New here?</span> 
                    <a href="{% url 'addstudent' %}" class="registration-link fw-bold">
                        Register as Student
                    </a>
                </div>
            </div>
        </div>
    </header>

    <footer class="fixed-bottom text-center py-3 text-white-50">
        &copy; 2026 ExamApp Suite
    </footer>

</body>
</html>
