<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Student Registration</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h3><i class="bi bi-person-plus"></i> Register New Student</h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Student ID</label>
                                <input type="number" name="sid" class="form-control" placeholder="e.g. 101" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="sname" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="semail" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Create Password</label>
                                <input type="password" name="spassword" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Department</label>
                                <select name="sdept" class="form-select">
                                    <option value="CS">Computer Science</option>
                                    <option value="IT">Information Technology</option>
                                    <option value="MECH">Mechanical</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2">Register Student</button>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-white">
                        <a href="{% url 'home' %}" class="text-decoration-none text-muted">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
