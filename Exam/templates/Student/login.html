<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Student Login</title>
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Student Login</h2>
                            <p class="text-muted">Enter your credentials to begin</p>
                        </div>
                        
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger p-2 small">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST" action="{% url 'login' %}">
       {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="semail" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="spassword" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mt-3">Sign In</button>
</form> 
                    </div>
                    <div class="card-footer text-center bg-white py-3">
                        <a href="{% url 'home' %}" class="text-decoration-none small text-muted">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
