<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Student Directory</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-success"><i class="bi bi-people-fill"></i> Registered Students</h2>
            <a href="{% url 'addstudent' %}" class="btn btn-primary"><i class="bi bi-person-plus"></i> Add New</a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body">
                <table class="table table-hover table-striped text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Email Address</th>
                            <th>Department</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for s in students %}
                        <tr>
                            <td>{{ s.sid }}</td>
                            <td>{{ s.sname }}</td>
                            <td>{{ s.semail }}</td>
                            <td><span class="badge bg-secondary">{{ s.sdepartment }}</span></td>
                            <td>
                                <a href="{% url 'editstudent' s.sid %}" class="btn btn-sm btn-warning">
        <i class="bi bi-pencil-square"></i> Edit
    </a>
                                <a href="#" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="5" class="text-muted py-4">No students registered yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a href="{% url 'home' %}" class="btn btn-link text-decoration-none text-muted">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
</body>
</html>
